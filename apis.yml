aid: reprise
name: Reprise
description: >
  Reprise is the leading enterprise demo automation platform that enables sales and marketing
  teams to create guided product tours, sandbox demos, and interactive leave-behind experiences
  without engineering involvement. The platform supports screen capture, data injection, and
  fully cloned environments to produce pixel-perfect, customizable product demonstrations at
  scale. Reprise offers a Data API for pulling real-time click-level engagement data into data
  warehouses and downstream platforms, along with pre-built integrations with Salesforce,
  HubSpot, Marketo, and Google Analytics. With over 20 million demos served, Reprise is
  trusted by enterprise customers including Databricks, ServiceNow, Cloudera, and iCIMS.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/reprise/refs/heads/main/apis.yml
