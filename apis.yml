apis:
  - aid: reprise:data-api
    name: Reprise Data API
    description: >
      The Reprise Data API allows teams to pull real-time, click-level demo engagement data
      directly from Reprise into data warehouses, data lakes, or downstream platforms. It
      supports analytics data including demo views, session data, viewer identity, activity
      tracking, and time-on-screen metrics, enabling automated sales and marketing workflows
      based on prospect interactions with demos.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.reprise.com/platform/analyze-optimize/
    baseURL: https://api.reprise.com
    tags:
      - Demo Analytics
      - Data Export
      - Engagement Tracking
      - Sales Intelligence
    properties:
      - type: Documentation
        url: https://docs.reprise.com/
      - type: OpenAPI
        url: https://docs.reprise.com/
    contact:
      - FN: Reprise Support
        url: https://www.reprise.com/contact

  - aid: reprise:html-environment-data-api
    name: Reprise HTML Environment Data API
    description: >
      The Reprise HTML Environment Data API enables dynamic data injection into HTML-based
      demo environments. It supports portal ID configuration, time period parameters for
      pulling demo data, and authentication via generated tokens, allowing real-time
      customization of live application data within captured demo experiences.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://reprise.zendesk.com/hc/en-us/articles/18940321925659-HTML-Environment-Data-API
    baseURL: https://api.reprise.com
    tags:
      - Data Injection
      - HTML Environments
      - Demo Customization
      - Real-time Data
    properties:
      - type: Documentation
        url: https://reprise.zendesk.com/hc/en-us/articles/18940321925659-HTML-Environment-Data-API
    contact:
      - FN: Reprise Support
        url: https://www.reprise.com/contact

